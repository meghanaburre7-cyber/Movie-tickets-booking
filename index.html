<body>

<!-- Title Page -->
<div id="titlePage">
    <h1>🎬 MOVIE TICKET BOOKING SYSTEM</h1>
    <h3>Online Movie Ticket Reservation</h3>
    <button onclick="startApp()">Enter</button>
</div>

<!-- Splash Screen -->
<div id="splash">
    <img src="logo.png" alt="Logo">
</div>

<!-- Movies Page -->
<div id="moviesPage">

    <h1>🎬 Now Showing Movies</h1>

    <div class="movie-container">

        <div class="movie-card">
            <img src="https://picsum.photos/300/450?1">
            <h3>Pushpa 2</h3>
            <button onclick="selectMovie('Pushpa 2')">Book Now</button>
        </div>

        <div class="movie-card">
            <img src="https://picsum.photos/300/450?2">
            <h3>Salaar</h3>
            <button onclick="selectMovie('Salaar')">Book Now</button>
        </div>

        <div class="movie-card">
            <img src="https://picsum.photos/300/450?3">
            <h3>Devara</h3>
            <button onclick="selectMovie('Devara')">Book Now</button>
        </div>

    </div>

</div>

<!-- Booking Page -->
<div id="bookingPage">

    <h1>🎟️ Book Ticket</h1>

    <h2 id="movieTitle"></h2>

    <input type="text" id="name" placeholder="Enter Name"><br>

    <select id="showtime">
        <option>10:00 AM</option>
        <option>2:00 PM</option>
        <option>6:00 PM</option>
        <option>9:00 PM</option>
    </select>

    <div class="screen">SCREEN</div>

    <div class="seats">
        <div class="seat">A1</div>
        <div class="seat">A2</div>
        <div class="seat">A3</div>
        <div class="seat">A4</div>

        <div class="seat">B1</div>
        <div class="seat">B2</div>
        <div class="seat">B3</div>
        <div class="seat">B4</div>
    </div>

    <div id="totalAmount">
        Total Amount: ₹0
    </div>

    <button onclick="bookTicket()">Confirm Booking</button>

</div>

</body>
